.wrapper{

.card{

.number{

.question{

}

.option{

    margin:14px 0;
    font-size:28px;
    cursor:pointer;
    transition:.2s;
}

.option:hover{
    background:#eef7ff;
}

.correct{
    background:#b8ffbf !important;
    border-color:#18a558 !important;
}

.wrong{
    background:#ffb8b8 !important;
    border-color:#d10000 !important;
}

.controls{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;

button{
    background:red;
    color:white;
    border:none;
    padding:13px 28px;
    border-radius:14px;
    font-size:26px;
    cursor:pointer;
    font-family:'Comic Neue', cursive;
}

button:hover{

}

.score{

    color:#333;
}

@media(max-width:600px){
    .card{width:82%; padding:25px;}
    .question{font-size:28px;}

}

let currentQuestion = 0;
let score = 0;
let answered = new Array(questions.length).fill(false);

function loadQuestion(){
    const q = questions[currentQuestion];

    document.getElementById("number").innerHTML =
    "Question " + (currentQuestion + 1) + " / " + questions.length;

    document.getElementById("question").innerHTML = q.q;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((option, index)=>{
        const div = document.createElement("div");
        div.className = "option";
        div.innerHTML = "• " + option;
        div.onclick = function(){
            checkAnswer(div, index);
        };
        optionsDiv.appendChild(div);
    });

    document.getElementById("score").innerHTML =
    "Score: " + score;
}

function checkAnswer(element, index){
    if(answered[currentQuestion]) return;

    answered[currentQuestion] = true;

    const correctIndex = questions[currentQuestion].answer;
    const options = document.querySelectorAll(".option");

    if(index === correctIndex){
        element.classList.add("correct");
        score++;
    }else{
        element.classList.add("wrong");
        options[correctIndex].classList.add("correct");
    }

    document.getElementById("score").innerHTML =
    "Score: " + score;
}

function nextQuestion(){
    if(currentQuestion < questions.length - 1){
        currentQuestion++;
        loadQuestion();
    }else{
        showResult();
    }
}

function prevQuestion(){
    if(currentQuestion > 0){
        currentQuestion--;
        loadQuestion();
    }
}

function showResult(){
    document.querySelector(".card").innerHTML =
    "<div class='number'>Finished!</div>" +
    "<div class='question'>Your score is:<br><br>" +
    score + " / " + questions.length +
    "</div>" +
    "<button onclick='location.reload()'>Restart</button>";
}
