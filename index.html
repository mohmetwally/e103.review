<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E103 Review</title>

<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:40px 0;
    font-family:'Comic Neue', cursive;

    /* NOTEBOOK BACKGROUND */
    background-color:#fdfdfd;

    background-image:
    linear-gradient(to bottom,
    transparent 31px,
    #b6dfff 32px),

    linear-gradient(to right,
    transparent 80px,
    #ffb3b3 81px,
    #ffb3b3 83px,
    transparent 84px);

    background-size:100% 32px;
}

/* PAGE */

.page{
    width:100%;
    display:flex;
    justify-content:center;
    margin-bottom:40px;
}

/* CARD */

.card{
    width:85%;
    max-width:850px;

    background:white;

    border:5px solid red;

    border-radius:25px;

    padding:35px;

    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

/* QUESTION NUMBER */

.number{
    color:red;
    font-size:26px;
    margin-bottom:20px;
    font-weight:bold;
}

/* QUESTION */

.question{
    font-size:34px;
    line-height:1.7;
    margin-bottom:30px;
}

/* OPTIONS */

.option{

    background:#fafafa;

    border:2px solid #e2e2e2;

    border-radius:15px;

    padding:16px 22px;

    margin:15px 0;

    font-size:28px;

    cursor:pointer;

    transition:.3s;
}

.option:hover{
    background:#eef7ff;
    transform:scale(1.01);
}

/* ANSWERS */

.correct{
    background:#b8ffbf !important;
}

.wrong{
    background:#ffb8b8 !important;
}

/* BUTTON */

.next{

    background:red;

    color:white;

    border:none;

    padding:14px 28px;

    border-radius:15px;

    font-size:26px;

    cursor:pointer;

    margin-top:25px;

    float:right;

    font-family:'Comic Neue', cursive;
}

.next:hover{
    background:#cc0000;
}

</style>
</head>

<body>

<!-- QUESTION 1 -->

<section class="page">

<div class="card">

<div class="number">
Question 1
</div>

<div class="question">
A: Hi, I'm Diane.<br>
B: __________
</div>

<div class="option" onclick="check(this,true)">
• Oh, hi. I'm Peter.
</div>

<div class="option" onclick="check(this,false)">
• What do people call you?
</div>

<button class="next">
Next >
</button>

</div>

</section>

<!-- QUESTION 2 -->

<section class="page">

<div class="card">

<div class="number">
Question 2
</div>

<div class="question">
A: My name is Bill.<br>
B: __________
</div>

<div class="option" onclick="check(this,true)">
• Nice to meet you, Bill.
</div>

<div class="option" onclick="check(this,false)">
• Let's go and say hello.
</div>

<button class="next">
Next >
</button>

</div>

</section>

<!-- QUESTION 3 -->

<section class="page">

<div class="card">

<div class="number">
Question 3
</div>

<div class="question">
A: Hello. I'm a new student here.<br>
B: __________
</div>

<div class="option" onclick="check(this,false)">
• Thanks.
</div>

<div class="option" onclick="check(this,true)">
• Welcome.
</div>

<button class="next">
Next >
</button>

</div>

</section>

<script>

function check(element, correct){

let options =
element.parentElement.querySelectorAll('.option');

options.forEach(opt=>{
opt.style.pointerEvents='none';
});

if(correct){
element.classList.add('correct');
}else{
element.classList.add('wrong');
}

}

</script>

</body>

</html>
